name: CI

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:

permissions:
  contents: read

env:
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "20"

jobs:
  backend:
    name: Backend build and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore backend solution
        run: dotnet restore source/backend/InShop.WebAPI/InShop.WebAPI.sln

      - name: Build backend solution
        run: dotnet build source/backend/InShop.WebAPI/InShop.WebAPI.sln --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test source/backend/InShop.WebAPI/InShopBLLayer.Tests/InShopBLLayer.Tests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"

      - name: Run integration tests
        run: dotnet test source/backend/InShop.WebAPI/InShop.IntegrationTests/InShop.IntegrationTests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: source/frontend/in-shop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: source/frontend/in-shop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        working-directory: deploy
        run: docker compose --env-file .env.example config --quiet

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: source/backend/InShop.WebAPI
          file: source/backend/InShop.WebAPI/InShop.WebAPI/Dockerfile
          push: false
          tags: inshop-api:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: source/frontend/in-shop
          file: source/frontend/in-shop/Dockerfile
          push: false
          tags: inshop-frontend:ci

      - name: Build embedding server image
        uses: docker/build-push-action@v6
        with:
          context: source/backend/EmbeddingServer
          file: source/backend/EmbeddingServer/Dockerfile
          push: false
          tags: inshop-embedding-server:ci