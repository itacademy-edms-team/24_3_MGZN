x-sqlserver-image: &sqlserver_image "mcr.microsoft.com/mssql/server:2025-latest@sha256:cee0f4db03b5192de777d37a22455949d1c2c230bb48c0a732b88b0933117a72"

services:
  sqlserver:
    image: *sqlserver_image
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD:?Set SA_PASSWORD in deploy/.env}
      MSSQL_PID: Developer
    ports:
      - "${SQLSERVER_PORT:-1433}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  sqlserver-init:
    image: *sqlserver_image
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: ${SA_PASSWORD:?Set SA_PASSWORD in deploy/.env}
      DB_NAME: ${DB_NAME:-InShopDB}
    entrypoint: >
      /bin/bash -c "
      /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C
      -Q \"IF DB_ID(N'$${DB_NAME}') IS NULL CREATE DATABASE [$${DB_NAME}]\";
      "
    restart: "no"

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  embedding-server:
    build:
      context: ../source/backend/EmbeddingServer
      dockerfile: Dockerfile
    ports:
      - "${EMBEDDING_PORT:-8000}:8000"
    volumes:
      - embedding_models:/models
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/docs >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  inshop-api:
    build:
      context: ../source/backend/InShop.WebAPI
      dockerfile: InShop.WebAPI/Dockerfile
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      embedding-server:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      Database__EnsureCreated: "true"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=${DB_NAME:-InShopDB};User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
      ConnectionStrings__Redis: "redis:6379,abortConnect=false"
      Embedding__BaseUrl: "http://embedding-server:8000/"
      Jwt__Issuer: ${JWT_ISSUER:-InShop}
      Jwt__Audience: ${JWT_AUDIENCE:-InShopAdmin}
      Jwt__Key: ${JWT_KEY:?Set JWT_KEY in deploy/.env}
      Jwt__ExpirationHours: ${JWT_EXPIRATION_HOURS:-8}
      Payment__Provider: ${PAYMENT_PROVIDER:-YooKassa}
      Payment__YooKassa__ShopId: ${YOOKASSA_SHOP_ID:?Set YOOKASSA_SHOP_ID in deploy/.env for YooKassa, or use docker-compose.dev.yml for Mock payments}
      Payment__YooKassa__SecretKey: ${YOOKASSA_SECRET_KEY:?Set YOOKASSA_SECRET_KEY in deploy/.env for YooKassa, or use docker-compose.dev.yml for Mock payments}
      Payment__YooKassa__BaseUrl: ${YOOKASSA_BASE_URL:-https://api.yookassa.ru/v3}
      Payment__YooKassa__WebhookSecret: ${YOOKASSA_WEBHOOK_SECRET:?Set YOOKASSA_WEBHOOK_SECRET in deploy/.env for YooKassa, or use docker-compose.dev.yml for Mock payments}
      Payment__YooKassa__IsTestMode: ${YOOKASSA_IS_TEST_MODE:-true}
      Payment__YooKassa__ReturnUrl: ${YOOKASSA_RETURN_URL:-http://localhost:3000/payment-confirmation}
      Payment__YooKassa__NotificationUrl: ${YOOKASSA_NOTIFICATION_URL:-http://localhost:5000/api/webhook/yookassa}
      AiSettings__ProviderType: ${AI_PROVIDER_TYPE:-Yandex}
      AiSettings__ApiKey: ${AI_API_KEY:-}
      AiSettings__FolderId: ${AI_FOLDER_ID:-}
      AiSettings__ModelName: ${AI_MODEL_NAME:-yandexgpt-lite}
      AiSettings__TimeoutSeconds: ${AI_TIMEOUT_SECONDS:-60}
      Email__SmtpServer: ${EMAIL_SMTP_SERVER:-}
      Email__Port: ${EMAIL_PORT:-587}
      Email__Username: ${EMAIL_USERNAME:-}
      Email__Password: ${EMAIL_PASSWORD:-}
    ports:
      - "${API_PORT:-5000}:8080"
    volumes:
      - product_uploads:/app/wwwroot/uploads/products

  frontend:
    build:
      context: ../source/frontend/in-shop
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: /api
    depends_on:
      - inshop-api
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  sqlserver_data:
  redis_data:
  embedding_models:
  product_uploads:
