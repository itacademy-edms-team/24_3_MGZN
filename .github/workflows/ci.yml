name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "20"

jobs:
  backend:
    name: Backend build and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore backend solution
        run: dotnet restore source/backend/InShop.WebAPI/InShop.WebAPI.sln

      - name: Build backend solution
        run: dotnet build source/backend/InShop.WebAPI/InShop.WebAPI.sln --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test source/backend/InShop.WebAPI/InShopBLLayer.Tests/InShopBLLayer.Tests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"

      - name: Run integration tests
        run: dotnet test source/backend/InShop.WebAPI/InShop.IntegrationTests/InShop.IntegrationTests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: source/frontend/in-shop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: source/frontend/in-shop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker:
    name: Docker build and publish
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image namespace
        id: images
        shell: bash
        run: echo "namespace=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Docker Compose config
        working-directory: deploy
        run: docker compose --env-file .env.example config --quiet

      - name: Prepare API image metadata
        id: api-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.namespace }}/inshop-api
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'main' || github.ref_name == 'master' }}
            type=raw,value=dev,enable=${{ github.ref_name == 'dev' }}
            type=sha,format=long

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: source/backend/InShop.WebAPI
          file: source/backend/InShop.WebAPI/InShop.WebAPI/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.api-meta.outputs.tags }}
          labels: ${{ steps.api-meta.outputs.labels }}

      - name: Prepare frontend image metadata
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.namespace }}/inshop-frontend
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'main' || github.ref_name == 'master' }}
            type=raw,value=dev,enable=${{ github.ref_name == 'dev' }}
            type=sha,format=long

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: source/frontend/in-shop
          file: source/frontend/in-shop/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}

      - name: Prepare embedding server image metadata
        id: embedding-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.namespace }}/inshop-embedding-server
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'main' || github.ref_name == 'master' }}
            type=raw,value=dev,enable=${{ github.ref_name == 'dev' }}
            type=sha,format=long

      - name: Build embedding server image
        uses: docker/build-push-action@v6
        with:
          context: source/backend/EmbeddingServer
          file: source/backend/EmbeddingServer/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.embedding-meta.outputs.tags }}
          labels: ${{ steps.embedding-meta.outputs.labels }}
